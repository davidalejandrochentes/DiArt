{% load static %}
<nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-100 transition-all duration-500" id="navbar-internal">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <!-- Logo -->
      <div class="flex items-center">
        <a href="/" class="text-3xl font-black font-heading relative group">
          <span class="bg-gradient-to-r from-primary to-accent-gold bg-clip-text text-transparent">DiArt</span>
          <span class="absolute inset-0 bg-gradient-to-r from-primary to-accent-gold bg-clip-text text-transparent blur-sm opacity-50 group-hover:opacity-100 transition-opacity">DiArt</span>
        </a>
      </div>

      <!-- Botón Volver -->
      <div class="hidden md:flex items-center">
        <a href="/" class="magnetic-btn inline-flex items-center gap-2 text-slate-700 hover:text-primary font-medium transition-all duration-300 group">
          <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          <span>Volver al inicio</span>
        </a>
      </div>

      <!-- Mobile Menu Button -->
      <div class="md:hidden flex items-center">
        <a href="/" class="inline-flex items-center gap-2 text-slate-700 hover:text-primary font-medium transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          <span>Volver</span>
        </a>
      </div>
    </div>
  </div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const navbar = document.getElementById('navbar-internal');
  
  if (navbar) {
    let lastScroll = 0;
    
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      
      if (currentScroll > 50) {
        navbar.classList.add('bg-white/95', 'shadow-lg');
      } else {
        navbar.classList.remove('bg-white/95', 'shadow-lg');
      }
      
      lastScroll = currentScroll;
    });
  }
});
</script>
